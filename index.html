<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
    </head>
    <body>
        <h1>Video Downloader</h1>

        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">URL: </span>
            <input
                id="url-input"
                type="text"
                class="form-control"
                aria-describedby="basic-addon1"
            />
        </div>
        <button
            id="add-btn"
            hx-get=""
            hx-on:click="updateGet()"
            hx-swap="innerHTML"
            hx-target="#download-queue-body"
            type="submit"
            class="btn btn-primary"
        >
            Add
        </button>

        <h3>Download Queue:</h3>

        <table class="table">
            <thead>
                <tr>
                    <th scope="col">URL</th>
                </tr>
            </thead>
            <tbody id="download-queue-body"></tbody>
        </table>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"
        ></script>
        <script src="https://unpkg.com/htmx.org@2.0.4"></script>
        <script>
            document.body.addEventListener("htmx:beforeSend", (evt) => {
                console.log(evt);
                let intputVal = document.getElementById("url-input").value;
                const url =
                    "http://localhost:6969/download_add/" +
                    encodedURIComponent(intputVal);
                evt.detail.pathInfo.requestPath = url;
                //document
                //    .getElementById("add-btn")
                //    .setAttribute(
                //        "hx-get",
                //        "http://localhost:6969/download_add/" +
                //            encodeURIComponent(intputVal),
                //    );
                console.log(intputVal);
            });
        </script>
        <script>
            htmx.logAll();
        </script>
    </body>
</html>
